name = "hotsearch-worker"
main = "worker.js"
compatibility_date = "2024-04-01"

# 免费计划限制：
# - 每天 100,000 请求
# - CPU 时间每次 10ms（JS 执行时间，不含网络等待）
# 热榜抓取通过网络请求完成，不占用 CPU 时间

# 可选：KV 缓存（存储热搜数据，减少重复抓取）
# 免费版可用 1 个 KV namespace
# [[kv_namespaces]]
# binding = "HOTDATA"
# id = "YOUR_KV_NAMESPACE_ID"

# 如需 KV 缓存，部署后运行：
# npx wrangler kv:namespace create HOTDATA
# 然后把返回的 id 填入上面的 id 字段
