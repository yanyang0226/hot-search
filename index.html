<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <title>Hot Search</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#0d1b2a;color:#e0e6ed;min-height:100vh}
    header{background:linear-gradient(135deg,#1e3a5f,#2d5a87);padding:16px 20px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
    .header-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:0 20px}
    .tabs::-webkit-scrollbar{display:none}
    .tab{padding:7px 14px;border-radius:20px;font-size:14px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);border:1px solid transparent;flex-shrink:0}
    .tab.active{background:rgba(255,255,255,0.22);color:#fff;border-color:rgba(255,255,255,0.3)}
    .refresh-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;font-size:12px;color:rgba(255,255,255,0.4);background:#0d1b2a}
    .refresh-btn{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);padding:4px 12px;border-radius:12px;font-size:12px;cursor:pointer}
    .list{padding:8px 16px 80px}
    .item{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer}
    .item:active{background:rgba(255,255,255,0.05);border-radius:8px;margin:0 -8px;padding:13px 8px}
    .rank{min-width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:1px;flex-shrink:0}
    .rank.top1{background:#ff4757;color:#fff}
    .rank.top2{background:#ff6b35;color:#fff}
    .rank.top3{background:#ffa502;color:#fff}
    .rank.other{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)}
    .content{flex:1;min-width:0}
    .title{font-size:15px;font-weight:500;color:#e8edf4;line-height:1.5;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-all}
    .source-tag{font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px}
    .loading{text-align:center;padding:60px 0;color:rgba(255,255,255,0.4);font-size:14px}
    .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#2d5a87;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.4);font-size:14px;line-height:1.8}
    /* 阅读器 */
    .reader-page{position:fixed;top:0;left:0;right:0;bottom:0;background:#f5f3ef;color:#222;z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
    .reader-page.open{transform:translateX(0)}
    .reader-header{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #e0ddd8;background:#fff;position:sticky;top:0;z-index:10;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
    .back-btn{background:none;border:none;color:#2d5a87;cursor:pointer;padding:6px 10px;border-radius:20px;font-size:15px;white-space:nowrap;flex-shrink:0;font-weight:500}
    .back-btn:active{background:#f0f0f0}
    .reader-source{font-size:12px;color:#999;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .open-original{background:none;border:1px solid #ddd;color:#666;font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-weight:500}
    .reader-body{flex:1;overflow-y:auto;padding:0}
    .reader-card{background:#fff;margin:16px;border-radius:16px;padding:24px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
    .reader-title{font-size:22px;font-weight:700;color:#111;line-height:1.6;margin-bottom:10px}
    .reader-meta{font-size:12px;color:#999;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f0f0f0}
    .summary-label{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#2d5a87;background:#e8f0fb;padding:3px 10px;border-radius:12px;margin-bottom:12px}
    .summary-points{list-style:none}
    .summary-points li{position:relative;padding-left:16px;margin-bottom:10px;font-size:15px;color:#333;line-height:1.7}
    .summary-points li::before{content:'•';position:absolute;left:0;color:#2d5a87;font-weight:700;font-size:18px;top:1px}
    .keyword-tag{font-size:11px;background:#f0f4f8;color:#555;padding:2px 8px;border-radius:10px;margin-right:4px;margin-bottom:4px;display:inline-block}
    .raw-label{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#888;background:#f5f5f5;padding:3px 10px;border-radius:12px;margin-bottom:14px}
    .raw-text{font-size:15px;line-height:1.9;color:#444}
    .raw-text p{margin-bottom:12px}
    .reader-loading{text-align:center;padding:60px 20px;color:#999}
    .reader-loading-spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:#2d5a87;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
    .reader-error{text-align:center;padding:60px 20px;color:#999}
    .reader-error .hint{font-size:13px;margin-top:10px;color:#bbb;line-height:1.8}
    .reader-error .hint a{color:#2d5a87}
    .ext-btn{background:#2d5a87;color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:14px;cursor:pointer;margin-top:16px;font-weight:500}
  </style>
</head>
<body>

<header>
  <div class="header-title"><span>🔥</span><span>热榜</span></div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="refresh-bar">
  <span id="updateTime">--</span>
  <span id="platformCount" style="font-size:12px"></span>
  <button class="refresh-btn" id="refreshBtn">🔄 刷新</button>
</div>

<div id="list" class="list"></div>

<div id="readerPage" class="reader-page">
  <div class="reader-header">
    <button class="back-btn" id="backBtn">← 返回</button>
    <span class="reader-source" id="readerSource"></span>
    <button class="open-original" id="openOriginal">浏览器</button>
  </div>
  <div class="reader-body" id="readerBody">
    <div class="reader-loading"><div class="reader-loading-spinner"></div>正在获取文章内容...</div>
  </div>
</div>

<script>
var WORKER_URL = 'https://hotsearch-worker.haiyun954123.workers.dev';

var PLATFORMS = [
  {id:'all',name:'全站'},
  {id:'baidu',name:'百度'},
  {id:'weibo',name:'微博'},
  {id:'zhihu',name:'知乎'},
  {id:'weixin',name:'微信'},
  {id:'thepaper',name:'澎湃'},
  {id:'huxiu',name:'虎嗅'},
  {id:'ithome',name:'IT之家'},
];

var FALLBACK_DATA = {
  all:[
    {title:'70年产权的房子，实际能住多少年？',source:'知乎',hot:'18497',url:'https://www.zhihu.com/question/2018272205939721140'},
    {title:'为什么云南泼水节变味了？',source:'知乎',hot:'15941',url:'https://www.zhihu.com/question/652795560'},
    {title:'DeepSeek V4即将发布并提出「去CUDA化」',source:'知乎',hot:'11324',url:'https://www.zhihu.com/question/2028817450829976782'},
    {title:'公司服务器淘汰72根DDR4内存被员工捡回：约2.25TB',source:'IT之家',hot:'9171',url:'https://www.ithome.com/0/940/930.htm'},
    {title:'日本发生7.5级地震',source:'微博',hot:'150万',url:'https://s.weibo.com/weibo?q=%E6%97%A5%E6%9C%AC7.5%E7%BA%A7%E5%9C%B0%E9%9C%87'}
  ]
};

var currentPlatform = 'all';
var dataCache = {};

function e(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 提取文章内容 + 生成摘要
function extractArticle(html) {
  try {
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');

    // 移除干扰
    ['script','style','noscript','iframe','svg','nav','header','footer','aside',
     'form','.sidebar','.share','.social','.toolbar','.navbar',
     '.comment','.advertisement','.ad','.fixed','.sticky','.popup','.modal',
     '.weixin-qrcode','.qrcode','.author-info','.article-actions',
     '[role="navigation"]','[role="banner"]'
    ].forEach(function(sel) {
      try { doc.querySelectorAll(sel).forEach(function(el){ el.remove(); }); } catch(ex){}
    });

    // 标题
    var title = '';
    ['h1','.article-title','.post-title','#article-title','article h2','.entry-title'
    ].forEach(function(sel) {
      var el = doc.querySelector(sel);
      if (el && el.textContent.trim().length > 5 && el.textContent.trim().length < 300) {
        title = el.textContent.trim(); return;
      }
    });
    if (!title) {
      var t = doc.querySelector('title');
      if (t) title = t.textContent.replace(/_.*$/,'').trim();
    }

    // Meta
    var metaAuthor = '', metaDate = '', metaDesc = '';
    var authorEl = doc.querySelector('meta[name="author"]') || doc.querySelector('[class*="author"]');
    if (authorEl) metaAuthor = (authorEl.getAttribute('content') || authorEl.textContent || '').trim().substring(0,50);
    var dateEl = doc.querySelector('meta[property="article:published_time"]') || doc.querySelector('time');
    if (dateEl) metaDate = (dateEl.getAttribute('content') || dateEl.getAttribute('datetime') || dateEl.textContent || '').trim().substring(0,10);
    var descEl = doc.querySelector('meta[name="description"]');
    if (descEl) metaDesc = (descEl.getAttribute('content') || '').trim().substring(0,200);

    // 正文区域
    var contentEl = doc.querySelector('article') || doc.querySelector('main') ||
      doc.querySelector('.article-content') || doc.querySelector('.post-content') ||
      doc.querySelector('#content') || doc.querySelector('.content') ||
      doc.querySelector('.news-content') || doc.body;

    var allSents = [];
    contentEl.querySelectorAll('p,h2,h3,h4,li').forEach(function(el) {
      var text = el.textContent.trim().replace(/\s+/g,' ');
      if (text.length < 15) return;
      var skip = ['登录','注册','收藏','评论','分享','上一篇','下一篇','相关推荐','相关阅读','Copyright','关键词'];
      if (skip.some(function(w){ return text.startsWith(w); })) return;
      var sentences = text.split(/[。！？.?!；]/).filter(function(s){ return s.trim().length > 8; });
      sentences.forEach(function(s) {
        s = s.trim();
        if (s.length < 5) return;
        allSents.push(s);
      });
    });

    // 去重
    var seen = {};
    allSents = allSents.filter(function(s) {
      var key = s.substring(0,10);
      if (seen[key]) return false;
      seen[key] = true;
      return true;
    });

    // 提取关键词
    var kwSet = {};
    var words = title.match(/[\u4e00-\u9fa5]{2,4}/g) || [];
    allSents.slice(0,3).forEach(function(s) {
      (s.match(/[\u4e00-\u9fa5]{2,4}/g) || []).forEach(function(w){ kwSet[w] = (kwSet[w]||0)+1; });
    });
    var keywords = Object.keys(kwSet).sort(function(a,b){ return kwSet[b]-kwSet[a]; }).slice(0,6);

    // 摘要：取前半段最有信息量的句子
    var halfIdx = Math.ceil(allSents.length * 0.4);
    var introSents = allSents.slice(0, halfIdx);
    introSents.forEach(function(s) {
      s._score = s.length;
      if (s.match(/\d{4,}/)) s._score += 8;
      if (s.match(/中国|美国|政府|政策|研究|发布|表示|发现|世界|全球|首次/)) s._score += 6;
      if (s.length > 30) s._score += 3;
    });
    introSents.sort(function(a,b){ return b._score - a._score; });
    var summary = introSents.slice(0,6).map(function(s){ return s.substring(0,250) + (s.length > 250 ? '…' : ''); });

    // 原始正文（前8段）
    var rawParagraphs = allSents.slice(0, 12).map(function(s){ return s.substring(0,300) + (s.length > 300 ? '…' : ''); });

    return {
      title: title.substring(0,200),
      author: metaAuthor,
      date: metaDate,
      desc: metaDesc,
      summary: summary,
      keywords: keywords,
      rawParagraphs: rawParagraphs,
      total: allSents.length
    };
  } catch(ex) {
    return null;
  }
}

function renderReader(title, url, source) {
  var readerPage = document.getElementById('readerPage');
  var readerBody = document.getElementById('readerBody');
  var readerSource = document.getElementById('readerSource');
  var openOriginal = document.getElementById('openOriginal');

  readerSource.textContent = source || '';
  openOriginal.style.display = '';
  openOriginal.onclick = function() { window.open(url, '_blank'); };
  readerBody.innerHTML = '<div class="reader-loading"><div class="reader-loading-spinner"></div>正在获取文章内容...</div>';
  readerPage.classList.add('open');
  document.body.style.overflow = '';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', WORKER_URL + '/proxy?url=' + encodeURIComponent(url), true);
  xhr.timeout = 25000;
  xhr.onload = function() {
    if (xhr.status === 200 && xhr.responseText && xhr.responseText.length > 500) {
      var art = extractArticle(xhr.responseText);
      if (!art || art.total < 3) {
        renderErr('无法解析文章内容', url); return;
      }
      renderArticle(art, title, source);
    } else {
      renderErr('文章加载失败', url);
    }
  };
  xhr.onerror = function() { renderErr('网络连接失败', url); };
  xhr.ontimeout = function() { renderErr('请求超时', url); };
  xhr.send();

  function renderArticle(art, fallbackTitle, fallbackSource) {
    var meta = [fallbackSource || ''];
    if (art.author) meta.push(art.author);
    if (art.date) meta.push(art.date.substring(0,10));
    if (art.total > 0) meta.push(Math.ceil(art.total/10) + '句话');

    var html = '<div class="reader-card">';
    html += '<div class="reader-title">' + e(art.title || fallbackTitle) + '</div>';
    html += '<div class="reader-meta">' + meta.filter(Boolean).join(' · ') + '</div>';

    // 关键信息摘要
    if (art.summary && art.summary.length > 0) {
      html += '<div class="summary-label">📌 关键信息</div>';
      html += '<ul class="summary-points">';
      art.summary.slice(0,6).forEach(function(p) {
        html += '<li>' + e(p) + '</li>';
      });
      html += '</ul>';
    }

    // 关键词
    if (art.keywords && art.keywords.length > 0) {
      html += '<div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:4px">';
      art.keywords.forEach(function(kw) {
        html += '<span class="keyword-tag">' + e(kw) + '</span>';
      });
      html += '</div>';
    }

    // 原文节选
    if (art.rawParagraphs && art.rawParagraphs.length > 0) {
      html += '<div class="raw-label">📖 原文节选</div>';
      html += '<div class="raw-text">';
      art.rawParagraphs.slice(0, 6).forEach(function(p) {
        html += '<p>' + e(p) + '</p>';
      });
      html += '</div></div>';
    }

    html += '<div style="text-align:center;padding:20px"><button class="ext-btn" onclick="window.open(\'' + e(url) + '\',\'_blank\')">🔗 在浏览器中完整阅读</button></div>';
    html += '</div>';
    readerBody.innerHTML = html;
    readerBody.scrollTop = 0;
  }

  function renderErr(msg, url) {
    readerBody.innerHTML = '<div class="reader-card"><div class="reader-error"><div style="font-size:48px;margin-bottom:12px">📰</div><div style="font-size:15px;color:#666;margin-bottom:8px">' + e(msg) + '</div><div class="hint">试试在浏览器中打开本文<br><button class="ext-btn" onclick="window.open(\'' + e(url) + '\',\'_blank\')">🌐 立即在浏览器打开</button></div></div></div>';
  }
}

function closeReader() {
  document.getElementById('readerPage').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('backBtn').onclick = closeReader;

var rStartX = 0;
document.getElementById('readerPage').addEventListener('touchstart', function(e){ rStartX = e.touches[0].clientX; }, {passive:true});
document.getElementById('readerPage').addEventListener('touchend', function(e){
  var d = e.changedTouches[0].clientX - rStartX;
  if (d > 80 && e.changedTouches[0].clientY < 300) closeReader();
}, {passive:true});

// 热榜加载
function loadAPI(pid) {
  return new Promise(function(res) {
    var t = setTimeout(function(){ res(FALLBACK_DATA[pid]||FALLBACK_DATA.all||[]); }, 12000);
    var x = new XMLHttpRequest();
    x.open('GET', WORKER_URL + '/api/' + pid, true);
    x.onload = function() {
      clearTimeout(t);
      if (x.status===200 && x.responseText) {
        try {
          var d = JSON.parse(x.responseText);
          if (d.code===1 && d.items && d.items.length>0) { res(d.items); return; }
        } catch(ex){}
      }
      res(FALLBACK_DATA[pid]||FALLBACK_DATA.all||[]);
    };
    x.onerror = function(){ clearTimeout(t); res(FALLBACK_DATA[pid]||FALLBACK_DATA.all||[]); };
    x.send();
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = PLATFORMS.map(function(p) {
    return '<div class="tab' + (p.id===currentPlatform?' active':'') + '" data-id="' + p.id + '">' + p.name + '</div>';
  }).join('');
  el.querySelectorAll('.tab').forEach(function(t) {
    t.onclick = function() {
      currentPlatform = this.getAttribute('data-id');
      renderTabs();
      renderList();
      window.scrollTo({top:0,behavior:'smooth'});
    };
  });
}

function renderList() {
  var el = document.getElementById('list');
  var items = dataCache[currentPlatform];
  if (!items || items.length===0) {
    el.innerHTML = '<div class="error-msg">暂无数据</div>'; return;
  }
  el.innerHTML = items.map(function(item,i) {
    var r = i+1;
    var c = r===1?'top1':r===2?'top2':r===3?'top3':'other';
    return '<div class="item" data-title="'+e(item.title)+'" data-url="'+e(item.url)+'" data-source="'+e(item.source||'')+'">'+
      '<div class="rank '+c+'">'+r+'</div>'+
      '<div class="content"><div class="title">'+e(item.title)+'</div>'+
      '<div class="source-tag">'+e(item.source||'')+(item.hot?' · '+item.hot:'')+'</div></div></div>';
  }).join('');
  el.querySelectorAll('.item').forEach(function(el2) {
    el2.onclick = function() {
      renderReader(
        this.getAttribute('data-title'),
        this.getAttribute('data-url'),
        this.getAttribute('data-source')
      );
    };
  });
}

async function loadAll() {
  document.getElementById('list').innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
  var items = await loadAPI(currentPlatform);
  dataCache[currentPlatform] = items;
  document.getElementById('platformCount').textContent = items.length > 0 ? items.length+'条' : '';
  renderList();
  var now = new Date();
  document.getElementById('updateTime').textContent = '更新 ' + ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
}

document.getElementById('refreshBtn').onclick = loadAll;
renderTabs();
loadAll();
setInterval(function() {
  if (!document.getElementById('readerPage').classList.contains('open')) loadAll();
}, 5*60*1000);
</script>
</body>
</html>
